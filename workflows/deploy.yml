name: Deploy to IONOS via SFTP

on:
  push:
    branches:
      - main   # or 'master' — whichever your main branch is

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install Node and dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 3️⃣ Build the static site
      - name: Build site
        run: npm run build

      # 4️⃣ Upload via SFTP to IONOS
      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps          # or sftp if your plan supports it
          local-dir: ./dist       # your build output folder
          server-dir: /htdocs/    # your IONOS web root
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
